<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, 'Noto Sans Gurmukhi', sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#37d0c4"/>
    </linearGradient>
    <radialGradient id="aur" cx="18%" cy="12%" r="70%">
      <stop offset="0" stop-color="#1a1740"/>
      <stop offset="1" stop-color="#0a0b14"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#aur)"/>
  <g transform="translate(90,90)">
    <rect width="96" height="96" rx="22" fill="#0a0b14" stroke="url(#g)" stroke-opacity="0.4" stroke-width="2"/>
    <text x="48" y="70" font-family="'Noto Sans Gurmukhi',sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="url(#g)">ਸ</text>
  </g>
  <text x="210" y="158" font-size="52" font-weight="800" fill="#f4f5fb">gurmukhifix</text>
  <text x="92" y="300" font-size="46" font-weight="700" fill="#f4f5fb">Safe, evidence-gated OCR correction</text>
  <text x="92" y="360" font-size="46" font-weight="700" fill="#f4f5fb">for Gurmukhi &amp; Indic scripts</text>
  <text x="92" y="430" font-size="28" fill="#aab0c8">Never silently corrupts correct text — including Gurbani. MIT-licensed.</text>
  <g transform="translate(92,480)" font-family="'Noto Sans Gurmukhi',sans-serif" font-size="40">
    <text x="0" y="40" fill="#ff8b8b">ਿਸੱਖ</text>
    <text x="150" y="40" font-size="32" fill="#aab0c8">→</text>
    <text x="210" y="40" fill="#37d0c4">ਸਿੱਖ</text>
    <text x="360" y="40" font-family="Inter,sans-serif" font-size="24" fill="#aab0c8">sihari reordered after its consonant</text>
  </g>
</svg>
